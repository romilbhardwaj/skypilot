# Loki configuration for local dev server.
# Adapted from sky/usage/loki-s3-config.yaml (production) with:
#   - filesystem storage instead of S3
#   - Listening on port 9091 (internal only, fronted by nginx)
#   - Relaxed reject_old_samples_max_age for dev flexibility

auth_enabled: false

server:
  http_listen_port: 9091
  http_server_read_timeout: 300s
  http_server_write_timeout: 300s
  grpc_server_max_recv_msg_size: 104857600  # 100 MB
  grpc_server_max_send_msg_size: 104857600  # 100 MB

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: loki_index_
        period: 24h

ingester:
  chunk_idle_period: 3m
  chunk_retain_period: 1m
  chunk_block_size: 1048576  # 1 MB
  wal:
    enabled: true
    dir: /loki/wal
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1

storage_config:
  filesystem:
    directory: /loki/chunks
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache

querier:
  max_concurrent: 16
query_scheduler:
  max_outstanding_requests_per_tenant: 2048
frontend:
  max_outstanding_per_tenant: 2048
query_range:
  parallelise_shardable_queries: true

frontend_worker:
  grpc_client_config:
    max_recv_msg_size: 104857600  # 100 MB
    max_send_msg_size: 104857600  # 100 MB

limits_config:
  max_query_series: 5000
  ingestion_rate_strategy: local
  max_global_streams_per_user: 5000
  max_query_length: 0h
  max_query_parallelism: 16
  max_entries_limit_per_query: 100000
  max_streams_per_user: 0
  reject_old_samples: true
  reject_old_samples_max_age: 720h  # 30 days, relaxed for dev
  query_timeout: 5m
  allow_structured_metadata: false

compactor:
  working_directory: /loki/compactor

chunk_store_config:
  chunk_cache_config:
    embedded_cache:
      enabled: true
      max_size_mb: 256

table_manager:
  retention_deletes_enabled: false
  retention_period: 0s
