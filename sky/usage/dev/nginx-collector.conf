# Write-only nginx proxy for Loki push endpoint.
# Accepts POST requests (matching usage_lib.py behavior) and forwards
# them to the internal Loki instance. All other methods/paths are denied.

server {
    listen 9090;

    # Health check endpoint
    location /ready {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Accept POST to root path (how usage_lib.py sends data)
    location = / {
        limit_except POST {
            deny all;
        }
        proxy_pass http://loki:9091/loki/api/v1/push;
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header X-Scope-OrgID "fake";
    }

    # Accept POST to the standard Loki push path
    location = /loki/api/v1/push {
        limit_except POST {
            deny all;
        }
        proxy_pass http://loki:9091/loki/api/v1/push;
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header X-Scope-OrgID "fake";
    }

    # Deny everything else
    location / {
        return 403 'Forbidden: write-only endpoint';
        add_header Content-Type text/plain;
    }
}
