# Read-only nginx proxy with basic auth.
# Provides access to Grafana UI and Loki read APIs.

server {
    listen 3225;

    auth_basic "SkyPilot Dev Loki";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Grafana UI (default)
    location / {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Grafana live
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Grafana API (used by Grafana UI)
    location /api/ {
        proxy_pass http://grafana:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Loki read APIs (GET only)
    location /loki/ {
        limit_except GET {
            deny all;
        }
        proxy_pass http://loki:9091/loki/;
        proxy_set_header X-Scope-OrgID "fake";
    }
}
