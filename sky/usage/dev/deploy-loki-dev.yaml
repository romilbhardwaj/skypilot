# SkyPilot task to deploy a dev Loki server on EC2.
#
# Usage:
#   sky launch -c loki-dev sky/usage/dev/deploy-loki-dev.yaml
#
# After deployment:
#   - Push endpoint: http://<IP>:9090  (write-only, no auth)
#   - Grafana UI:    http://<IP>:3225  (login: admin / skypilot-dev)
#
# To point SkyPilot at this dev server:
#   export SKYPILOT_LOG_URL=http://<IP>:9090

resources:
  cloud: aws
  region: us-west-2
  cpus: 2+
  memory: 4+
  disk_size: 50
  ports:
    - 9090
    - 3225

file_mounts:
  /tmp/loki-dev: sky/usage/dev

setup: |
  # Install Docker if not present
  if ! command -v docker &> /dev/null; then
    sudo apt-get update
    sudo apt-get install -y ca-certificates curl gnupg
    sudo install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
      sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    sudo chmod a+r /etc/apt/keyrings/docker.gpg
    echo "deb [arch=$(dpkg --print-architecture) \
      signed-by=/etc/apt/keyrings/docker.gpg] \
      https://download.docker.com/linux/ubuntu \
      $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
      sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
    sudo apt-get update
    sudo apt-get install -y docker-ce docker-ce-cli containerd.io \
      docker-buildx-plugin docker-compose-plugin
    sudo usermod -aG docker $USER
  fi

  # Generate htpasswd file for viewer basic auth (admin:skypilot-dev)
  python3 -c "import hashlib,base64;s=base64.b64encode(hashlib.sha1(b'skypilot-dev').digest()).decode();open('/tmp/loki-dev/.htpasswd','w').write('admin:{SHA}'+s+'\n')"

run: |
  cd /tmp/loki-dev

  # Ensure docker group membership is active
  sg docker -c "docker compose up -d"

  # Wait for services to be ready
  echo "Waiting for services to start..."
  for i in $(seq 1 30); do
    if curl -sf http://localhost:9090/ready > /dev/null 2>&1; then
      echo "Collector is ready."
      break
    fi
    sleep 2
  done

  CLUSTER_IP=$(curl -sf http://checkip.amazonaws.com || echo "<IP>")
  echo ""
  echo "============================================"
  echo "  Dev Loki Server Deployed Successfully"
  echo "============================================"
  echo ""
  echo "Push endpoint (write-only, no auth):"
  echo "  http://${CLUSTER_IP}:9090"
  echo ""
  echo "Grafana UI (login: admin / skypilot-dev):"
  echo "  http://${CLUSTER_IP}:3225"
  echo ""
  echo "To point SkyPilot at this server:"
  echo "  export SKYPILOT_LOG_URL=http://${CLUSTER_IP}:9090"
  echo ""
  echo "To verify:"
  echo "  bash sky/usage/dev/test-push.sh http://${CLUSTER_IP}:9090"
  echo "============================================"

  # Keep the task running so the cluster stays up
  sleep infinity
